<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Dashboard</span>
    </div>
</nav>

<div class="container mt-5 text-center">

    <h2 id="welcome"></h2>

    <div class="card p-3 mt-4">
        <button class="btn btn-success" onclick="showTime()">Show Date & Time</button>
        <p id="time" class="mt-2"></p>
    </div>

    <div class="mt-4">
        <a href="courses.html" class="btn btn-primary m-1">Courses</a>
        <a href="feedback.html" class="btn btn-warning m-1">Feedback</a>
        <a href="index.html" class="btn btn-secondary m-1">Home</a>
    </div>

</div>

<script>
var name = localStorage.getItem("studentName");
document.getElementById("welcome").innerText = "Welcome " + name;

function showTime(){
    document.getElementById("time").innerText = new Date();
}
</script>

</body>
</html>
