<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5" style="max-width: 400px;">
    <h2 class="text-center">Registration Form</h2>

    <form onsubmit="return validateForm()">

        <input type="text" id="name" class="form-control mt-3" placeholder="Enter Name">

        <input type="email" id="email" class="form-control mt-3" placeholder="Enter Email">

        <input type="password" id="password" class="form-control mt-3" placeholder="Enter Password">

        <input type="password" id="confirm" class="form-control mt-3" placeholder="Confirm Password">

        <input type="number" id="age" class="form-control mt-3" placeholder="Enter Age">

        <select id="gender" class="form-control mt-3">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <button class="btn btn-primary w-100 mt-3">Register</button>

    </form>
</div>

<script>
function validateForm() {

    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var confirm = document.getElementById("confirm").value;
    var age = document.getElementById("age").value;
    var gender = document.getElementById("gender").value;

    if(name == "" || email == "" || password == "" || confirm == "" || age == "" || gender == ""){
        alert("Please fill all fields");
        return false;
    }

    if(password != confirm){
        alert("Passwords do not match");
        return false;
    }

    if(isNaN(age)){
        alert("Age must be a number");
        return false;
    }

    localStorage.setItem("studentName", name);
    window.location.href = "dashboard.html";

    return false;
}
</script>

</body>
</html>
