<!DOCTYPE html>
<html>
<head>
    <title>Courses</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center">Course Selection</h2>

    <div class="mt-4">
        <input type="checkbox" id="c1" value="Web Development"> Web Development <br><br>
        <input type="checkbox" id="c2" value="Artificial Intelligence"> Artificial Intelligence <br><br>
        <input type="checkbox" id="c3" value="Database Systems"> Database Systems <br><br>
        <input type="checkbox" id="c4" value="Mobile App Development"> Mobile App Development <br><br>
    </div>

    <button class="btn btn-primary w-100 mt-3" onclick="showCourses()">Submit Courses</button>

    <a href="dashboard.html" class="btn btn-secondary w-100 mt-3">Back to Dashboard</a>
</div>

<script>
function showCourses() {

    var list = [];

    if(document.getElementById("c1").checked){
        list.push("Web Development");
    }

    if(document.getElementById("c2").checked){
        list.push("Artificial Intelligence");
    }

    if(document.getElementById("c3").checked){
        list.push("Database Systems");
    }

    if(document.getElementById("c4").checked){
        list.push("Mobile App Development");
    }

    alert("Selected Courses: " + list.join(", "));
}
</script>

</body>
</html>
