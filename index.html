<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* Navbar */
        .navbar {
            background-color: #222;
            color: blanchedalmond;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
            font-size: 20px;
        }

        .navbar ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .navbar ul li {
            margin-left: 20px;
        }

        .navbar ul li a {
            color: greenyellow;
            text-decoration: none;
            font-size: 14px;
        }

        .navbar ul li a:hover {
            color: #00bcd4;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
            color: #333;
        }

        .hero p {
            color: #666;
        }
    </style>

</head>
<body>

    <div class="navbar">
        <h2>Student Portal</h2>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Registration</a></li>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Courses</a></li>
            <li><a href="#">Feedback</a></li>
        </ul>
    </div>

    
    <div class="hero">
        <h1>Welcome to Student Portal</h1>
        <p>This is my  mini web portal </p>
    </div>

</body>
</html>
