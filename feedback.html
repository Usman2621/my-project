<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center">Feedback Form</h2>

    <form onsubmit="return submitFeedback()">

        <input type="text" id="name" class="form-control mt-3" placeholder="Enter Name">

        <textarea id="comments" class="form-control mt-3" placeholder="Enter Comments"></textarea>

        <select id="rating" class="form-control mt-3">
            <option value="">Select Rating</option>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
        </select>

        <button class="btn btn-success mt-4 w-100">Submit Feedback</button>

    </form>

    <a href="dashboard.html" class="btn btn-secondary mt-3 w-100">Back to Dashboard</a>
</div>

<script>
function submitFeedback() {

    var name = document.getElementById("name").value;
    var comments = document.getElementById("comments").value;
    var rating = document.getElementById("rating").value;

    if(name == "" || comments == "" || rating == ""){
        alert("Please fill all fields");
        return false;
    }

    alert("Feedback Submitted Successfully");
    return false;
}
</script>

</body>
</html>
